# =============================================================================
# MaxClaw — config.yaml (v3.0)
# Sicherheits-Philosophie: DEFAULT-DENY. Grundsätzlich darf der Agent nichts;
# nur explizit freigeschaltete Tools/Befehle sind erlaubt.
# v3.0: GreyHack-Track aktiviert — siehe Block "greyhack".
# =============================================================================

# --- Modell-Routing: verschiedene Modelle für verschiedene Aufgaben ----------
# Prinzip (docs/02): billig für Routine, stark nur wenn Qualität zählt.
models:
  # Hauptagent im Alltag — günstig aber gut
  main:
    provider: openrouter          # ein Key, viele Modelle
    model: moonshotai/kimi-k2.5   # günstig-aber-gut
    monthly_limit_eur: 20         # harte Kostengrenze
    fallback: openrouter/free     # bei Limit → kostenloses Modell

  # Komplexe Aufgaben / Coding — stark, nur wenn nötig
  heavy:
    provider: openrouter
    model: anthropic/claude-opus-4.6
    # v3.0: GreyHack-spezifische Tasks NUTZEN heavy (siehe "greyhack.heavy_tasks")

  # Heartbeat & Routine-Checks — so billig wie möglich (läuft alle 30 min!)
  heartbeat:
    provider: openrouter
    model: google/gemini-flash

  # Subagenten (Recherche) — billig, brauchen keine Power
  subagent:
    provider: openrouter
    model: google/gemini-flash

# --- Berechtigungen: DEFAULT-DENY --------------------------------------------
permissions:
  default: deny                   # <-- Kern der Sicherheit (unverändert)

  tools:
    terminal:
      enabled: true
      # nur diese Shell-Befehle sind erlaubt (Allowlist):
      allow:
        - "git status"
        - "git diff*"
        - "git log*"
        - "git add*"
        - "git commit*"
        - "ls*"
        - "cat*"
        - "grep*"
        - "find*"
        - "wc*"
        # --- GreyHack-Build-Pipeline (v3.0) ---
        - "greybel build"           # OHNE -u! (Inline-if-Workaround)
        - "greybel build*"
        # --- GreyHack-Sandbox (v3.0) ---
        - "python3 ~/projects/greyhack-sandbox/src/greyhack-sandbox.py*"
        - "python3 ~/projects/greyhack-sandbox/src/npc_intel.py*"
        - "python3 ~/projects/greyhack-sandbox/src/auto_pwn.py*"
        - "python3 -m http.server 8765"  # lokaler Fileserver (read-only by design)
      # explizit verboten (auch wenn oben gematcht):
      deny:
        - "rm -rf*"
        - "rm -fr*"
        - "git push* main*"        # main-Push nur nach Freigabe (Bastis Regel)
        - "sudo*"
        - "curl* | *sh"            # kein blindes Pipe-to-shell
        # --- GreyHack-spezifische Verbote (v3.0) ---
        - "greybel build -u*"      # -u-Flag ist broken (Inline-if-Bug)
        - "greybel build*-u*"      # auch wenn -u am Ende steht
        - "ssh root@*"             # keine echten SSH-Logins (nur Sandbox via net_use)
        - "ssh *@* prod*"

    file:
      enabled: true
      write_paths:                 # Schreiben nur in diesen Ordnern
        - "~/greyhack-tools/"
        - "~/greyhack-tools/greyhack-sandbox/"   # v3.0: Sandbox-Arbeitsordner
        - "~/greyhack-tools/build/"              # v3.0: greybel Output
        - "~/greyhack-tools/mission-logs/"       # v3.0: Strike-Logs
        - "~/docs/"
        - "~/.openclaw/agent/"
        - "~/.openclaw/workflows/"
        - "~/.openclaw/out/"                     # v3.0: Sandbox-Clone-Ziel
      deny_paths:                  # v3.0: explizit tabu
        - "/etc/"
        - "/var/"
        - "~/greyhack-tools/.git/"                # keine direkte .git-Manipulation
        - "/mnt/DATA/Programme/Steam/"            # Game-Dateien tabu

    browser:
      enabled: false              # aus — Prompt-Injection-Risiko (docs/07)

    web_search:
      enabled: true

# --- Bestätigungspflicht (Human-in-the-loop) ---------------------------------
confirmations:
  require_before:
    - send_message                # Nachrichten senden
    - publish                     # veröffentlichen
    - delete_outside_workspace    # löschen außerhalb des Arbeitsordners
    - git_push_main               # push auf main
    # --- GreyHack-spezifisch (v3.0) ---
    - greyhack_strike             # jeder metax.net_use / SSH-Login gegen neue IP
    - greyhack_money_transfer     # bank_grab.src-Workflow (echtes Geld im Spiel)
    - greyhack_account_delete     # user/disable-account Operationen

# --- Secrets: niemals im Klartext hier! --------------------------------------
# A1 ENTSCHEIDUNG 2026-07-04: Hermes-nativ (auth.json, mode 0600).
# OpenClaw-SecretRef-Path ist nicht aktiv (~/.openclaw/out/ nicht vorhanden).
# Least Privilege: API-Keys nur mit kleinstmöglicher Berechtigung.
secrets:
  backend: hermes_native           # auth.json mit 0600
  path: "~/.hermes/auth.json"
  rotation_days: 90               # alle 90 Tage Key-Rotation (siehe security/key_rotation.md)

# --- Gateway / Netzwerk (siehe docs/08) --------------------------------------
gateway:
  bind: "127.0.0.1"               # NUR localhost — nie 0.0.0.0!
  port: 18789
  require_token: true             # Gateway-Token Pflicht

# --- Channels (Plugins unter der Haube) --------------------------------------
channels:
  telegram:
    enabled: true
    # bot_token: in auth.json (0600), NICHT hier eintragen
    home_chat_id: "7222661188"    # Basti

# --- Automatisierung ---------------------------------------------------------
automation:
  heartbeat:
    interval_minutes: 30
    model: heartbeat              # billiges Modell erzwingen
  cron:
    enabled: true
    # konkrete Jobs: siehe workflows/ + register-workflows.sh

# =============================================================================
# GreyHack-Block (NEU in v3.0)
# Sämtliche GreyHack-bezogenen Einstellungen sind hier gebündelt,
# damit Security-Audits sie an einer Stelle finden.
# =============================================================================
greyhack:
  enabled: true                   # GreyHack-Track ist aktiv
  # --- Spieler-Kontext ---
  player: "Bratan"
  game_version: "V0.9.6771-beta"
  install_path: "/mnt/DATA/Programme/Steam/steamapps/common/Grey Hack"
  tools_dir: "~/greyhack-tools/"  # lokales Repo
  in_game_tools_dir: "/mnt/DATA/Programme/Steam/steamapps/common/Grey Hack/yuno-tools/"

  # --- Active Missions (gespiegelt nach MEMORY.md) ---
  active_missions:
    - id: "reraldi_main"
      target_ip: "154.19.190.206"
      contact: "Reraldi@adahidomev.net"
      status: "recon"             # recon | strike | done | failed
      next_step: "NPC-Intel-Subagent starten"

  # --- Build-Pipeline ---
  build:
    binary: "greybel"             # Pfad-Auflösung via $PATH
    use_flag: false               # v3.0: IMMER ohne -u (Inline-if-Bug)
    output_dir: "~/greyhack-tools/build/"
    required_header: "//command:" # erste Zeile Pflicht
    sandbox_test_dir: "/tmp/MaxClaw/greyhack-sandbox/"

  # --- Sandbox-Konfiguration ---
  sandbox:
    clone_from: "~/greyhack-tools/"   # sandbox_clone erlaubt von hier
    clone_to:   "/tmp/MaxClaw/greyhack-sandbox/"
    cleanup_after_hours: 24           # Auto-Cleanup alter Sandbox-Klone
    network_isolation: true           # Sandbox darf NICHT echtes Netz erreichen

  # --- Modell-Routing für GreyHack-Tasks (v3.0: heavy gezielt erlaubt) ---
  heavy_tasks:
    - "greybel build validation"      # neuer Build → heavy-Modell prüft Syntax
    - "grey_script generation"        # neue Scripts → heavy
    - "exploit_chain reasoning"       # komplexe Multi-Hop-Planung
    - "npc_intel deep scan"           # Subagent-Recon (kann auch subagent-Modell)

  # --- Erlaubte GreyHack-Workflows (Whitelist) ---
  allowed_workflows:
    - "portscan"                      # nmap/net_use Loop
    - "bruteforce"                    # SSH-Login-Loop mit Wortliste
    - "deep_recon"                    # /etc/passwd + /home + Config-Loot
    - "hardening_audit"               # READ-ONLY (default)
    - "hardening_apply"               # nur nach expliziter Freigabe
    - "dee_strike"                    # vordefinierte NPC-Strikes
    - "multihop_strike"               # Dee → LAN → Royal
    - "bank_grab"                     # money_transfer erfordert Bestätigung
    - "trace_clean"                   # Log-Bereinigung (Sandbox)

  # --- Verboten auch wenn oben erlaubt (Defense-in-Depth) ---
  forbidden_targets:
    - "127.0.0.1"                     # nicht localhost
    - "0.0.0.0"
    - "10.0.0.0/8"                    # nur Bastis dokumentierte 10.0.22/12/23-Sandbox-Subnets
    - "192.168.0.0/16"
    - "172.16.0.0/12"

# --- Validation ----------------------------------------------------------------
# Beim Start läuft `~/bin/maxclaw-config-check.sh` und failt hart bei:
#   - default != deny
#   - git push*main* fehlt in deny
#   - greybel build ohne -u-Regel
#   - sandbox nicht aktiv
#   - browser enabled
# siehe: ~/bin/maxclaw-config-check.sh